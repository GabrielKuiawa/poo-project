name: mood-board-api
region: nyc

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

domains:
  - domain: api.mood-board.gabizin.me
    type: PRIMARY

services:
  - name: api
    github:
      repo: GabrielKuiawa/mood-board
      branch: main
      deploy_on_push: false
    dockerfile_path: Dockerfile
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    routes:
      - path: /
    envs:
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: PORT
        scope: RUN_TIME
        value: "3000"
      - key: DB_HOST
        scope: RUN_TIME
        type: SECRET
        value: ${DB_HOST}
      - key: DB_PORT
        scope: RUN_TIME
        type: SECRET
        value: ${DB_PORT}
      - key: DB_USERNAME
        scope: RUN_TIME
        type: SECRET
        value: ${DB_USERNAME}
      - key: DB_PASSWORD
        scope: RUN_TIME
        type: SECRET
        value: ${DB_PASSWORD}
      - key: DB_DATABASE
        scope: RUN_TIME
        type: SECRET
        value: ${DB_DATABASE}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
        value: ${JWT_SECRET}
