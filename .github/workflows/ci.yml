name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, build and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check backend TypeScript
        working-directory: backend
        run: npm run typecheck

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Run backend unit tests
        working-directory: backend
        run: npm run test:unit

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend and verify HTTP response
        working-directory: frontend
        run: |
          npm run preview -- --host 127.0.0.1 > "$RUNNER_TEMP/frontend.log" 2>&1 &
          frontend_pid=$!
          trap 'kill "$frontend_pid"' EXIT

          for attempt in {1..10}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat "$RUNNER_TEMP/frontend.log"
          exit 1

  database-tests:
    name: Integration and E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Start test database
        working-directory: backend
        run: npm run test:db:up

      - name: Run integration tests
        working-directory: backend
        run: npm run test:integration

      - name: Run E2E tests
        working-directory: backend
        run: npm run test:e2e

      - name: Stop test database
        if: always()
        working-directory: backend
        run: npm run test:db:down

  deploy-backend:
    name: Deploy backend to DigitalOcean
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: database-tests
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy App Platform application
        uses: digitalocean/app_action/deploy@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          app_name: mood-board
          print_build_logs: true
          print_deploy_logs: true

  build-frontend-pages:
    name: Build frontend for GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: database-tests
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend for production
        working-directory: frontend
        env:
          VITE_API_URL: https://api.mood-board.gabizin.me
          VITE_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/dist

  deploy-frontend:
    name: Deploy frontend to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-frontend-pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
