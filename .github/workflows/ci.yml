name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: Backend typecheck, build and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Check backend TypeScript
        working-directory: backend
        run: npm run typecheck

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Run backend unit tests
        working-directory: backend
        run: npm run test:unit

  frontend-quality:
    name: Frontend lint, build and HTTP check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start frontend and verify HTTP response
        working-directory: frontend
        run: |
          npm run preview -- --host 127.0.0.1 > "$RUNNER_TEMP/frontend.log" 2>&1 &
          frontend_pid=$!
          trap 'kill "$frontend_pid"' EXIT

          for attempt in {1..10}; do
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat "$RUNNER_TEMP/frontend.log"
          exit 1

  database-tests:
    name: Integration and E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: backend-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Start test database
        working-directory: backend
        run: npm run test:db:up

      - name: Run integration tests
        working-directory: backend
        run: npm run test:integration

      - name: Run E2E tests
        working-directory: backend
        run: npm run test:e2e

      - name: Stop test database
        if: always()
        working-directory: backend
        run: npm run test:db:down
