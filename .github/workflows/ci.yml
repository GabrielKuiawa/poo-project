name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, build and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript
        run: npm run typecheck

      - name: Build application
        run: npm run build

      - name: Run unit tests
        run: npm run test:unit

  database-tests:
    name: Integration and E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start test database
        run: npm run test:db:up

      - name: Run integration tests
        run: npm run test:integration

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Stop test database
        if: always()
        run: npm run test:db:down

  deploy:
    name: Deploy backend to DigitalOcean
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: database-tests
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      vars.DIGITALOCEAN_DEPLOY_ENABLED == 'true'
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy App Platform application
        uses: digitalocean/app_action/deploy@v2
        env:
          DB_HOST: ${{ secrets.DO_DB_HOST }}
          DB_PORT: ${{ secrets.DO_DB_PORT }}
          DB_USERNAME: ${{ secrets.DO_DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DO_DB_PASSWORD }}
          DB_DATABASE: ${{ secrets.DO_DB_DATABASE }}
          JWT_SECRET: ${{ secrets.DO_JWT_SECRET }}
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
          print_build_logs: true
          print_deploy_logs: true
