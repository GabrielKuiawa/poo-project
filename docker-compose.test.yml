name: poo-project-test

services:
  mysql-test:
    image: mysql:8.4
    profiles: ["test"]
    ports:
      - "${DB_TEST_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_TEST_ROOT_PASSWORD:-test_root_password}
      MYSQL_DATABASE: ${DB_TEST_DATABASE:-image_management_test}
      MYSQL_USER: ${DB_TEST_USERNAME:-test_user}
      MYSQL_PASSWORD: ${DB_TEST_PASSWORD:-test_password}
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -P 3306 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 20s
